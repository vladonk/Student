<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMH // TERMINAL_OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000000; --surface: #0d0d0d; --border: #222;
            --text: #ffffff; --accent: #39FF14; --warning: #ff0000; --dim: #666;
        }
        * { box-sizing: border-box; border-radius: 0 !important; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 15px; text-transform: uppercase; font-size: 12px;
        }
        
        /* HEADER & NAV */
        header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--text); padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .nav-bar { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-wrap: wrap; }
        .nav-btn { background: none; border: 1px solid transparent; color: var(--dim); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; padding: 8px 12px; transition: 0.3s; flex-grow: 1; text-align: center; }
        .nav-btn:hover { color: var(--text); }
        .nav-btn.active { color: var(--accent); border: 1px solid var(--accent); }

        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & GRIDS */
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { border: 1px solid var(--border); padding: 15px; background: var(--surface); transition: 0.2s; }
        .stat-card.clickable:hover { border-color: var(--accent); cursor: pointer; }
        .stat-value { font-size: 1.8rem; font-weight: bold; display: block; color: var(--text); }
        .stat-label { color: var(--dim); font-size: 9px; }
        
        .box { border: 1px solid var(--border); padding: 20px 15px; background: var(--surface); position: relative; margin-bottom: 25px; }
        .box-title { position: absolute; top: -10px; left: 10px; background: var(--bg); padding: 0 10px; font-weight: bold; color: var(--accent); font-size: 11px; }
        
        .btn-action { width: 100%; padding: 15px; background: none; border: 1px solid var(--text); color: var(--text); margin-top: 15px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; }
        .btn-action:hover { background: var(--text); color: var(--bg); }
        #user-btn { cursor: pointer; border: 1px solid var(--accent); padding: 4px 8px; color: var(--accent); }

        /* TASKS */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; gap: 10px; }
        .task-item.completed { opacity: 0.3; text-decoration: line-through; }
        .task-actions { display: flex; gap: 5px; }
        .task-actions button { padding: 8px 12px; font-size: 10px; }
        .tag-owner { color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; font-size: 9px; margin-top: 5px; display: inline-block; }

        /* CALENDAR */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; }
        .cal-day-label { color: var(--dim); font-size: 10px; padding-bottom: 10px; }
        .cal-cell { border: 1px solid #1a1a1a; padding: 10px 2px; min-height: 50px; cursor: pointer; font-size: 12px; position: relative; }
        .cal-cell:hover { border-color: var(--dim); background: #111; }
        .cal-cell.today { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(57, 255, 20, 0.05); }
        .cal-event-text { display: block; font-size: 8px; color: var(--accent); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .cal-nav { background: none; border: 1px solid var(--dim); color: var(--text); cursor: pointer; padding: 8px 12px; font-weight: bold; font-size: 10px; }
        .cal-nav:hover { background: var(--text); color: var(--bg); }

        .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* ================= MOBILE ADAPTATION ================= */
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .header-right { text-align: left !important; margin-top: 10px; }
            .top-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .split-layout { grid-template-columns: 1fr !important; }
            .stat-value { font-size: 1.5rem; }
            .nav-bar { flex-direction: column; gap: 5px; border-bottom: none; }
            .cal-cell { min-height: 45px; padding: 5px 1px; }
            .task-item { flex-direction: column; align-items: flex-start; }
            .task-actions { width: 100%; justify-content: space-between; margin-top: 5px; }
            .task-actions button { flex-grow: 1; }
            .cal-nav { padding: 5px 8px; }
            #calendar-month-name { font-size: 1.2rem !important; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size: 1.2rem;">SMH // CONTROL_PANEL</h1>
        <div style="color: var(--dim); font-size: 9px; margin-top: 5px;">DATABASE_LINK: <span id="db-status">CONNECTING...</span></div>
    </div>
    <div class="header-right" style="text-align: right;">
        <span id="user-btn" onclick="changeUser()">LOGIN</span><br>
        <span id="live-clock" style="font-size: 9px; color: var(--dim); display: block; margin-top: 5px;"></span>
    </div>
</header>

<div class="nav-bar">
    <button class="nav-btn active" onclick="switchView('dashboard')">DASHBOARD</button>
    <button class="nav-btn" onclick="switchView('calendar')">CALENDAR</button>
    <button class="nav-btn" onclick="switchView('tasks')">TASK-URI</button>
</div>

<div id="view-dashboard" class="view active">
    <div class="top-stats">
        <div class="stat-card"><span class="stat-label">ACTIVE</span><span class="stat-value" id="count-active">0</span></div>
        <div class="stat-card"><span class="stat-label">COMPLETATE</span><span class="stat-value" id="count-done">0</span></div>
        <div class="stat-card"><span class="stat-label">ECHIPĂ</span><span class="stat-value">03</span></div>
        <div class="stat-card clickable" onclick="changeObiectiv()">
            <span class="stat-label">OBIECTIV PREZENȚĂ</span>
            <span class="stat-value" id="stat-obiectiv">0/30</span>
        </div>
    </div>

    <div class="split-layout">
        <div class="box" style="cursor: pointer;" onclick="switchView('tasks')">
            <span class="box-title">ULTIMELE TASK-URI</span>
            <div id="dash-tasks-preview" style="min-height: 100px; color: var(--dim);">SE ÎNCARCĂ...</div>
        </div>
        <div class="box" style="cursor: pointer;" onclick="switchView('calendar')">
            <span class="box-title">URMĂTOARELE EVENIMENTE</span>
            <div id="dash-events-preview" style="min-height: 100px; color: var(--dim);">SE ÎNCARCĂ...</div>
        </div>
    </div>

    <div class="box">
        <span class="box-title">STATUS ECHIPĂ</span>
        <div id="team-list" class="split-layout" style="grid-template-columns: repeat(3, 1fr);"></div>
    </div>
</div>

<div id="view-calendar" class="view">
    <div class="box">
        <span class="box-title">CALENDAR_PROIECT_FULL</span>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button class="cal-nav" onclick="changeMonth(-1)">[ ÎNAPOI ]</button>
            <div id="calendar-month-name" style="font-weight: bold; font-size: 1.5rem; text-align: center;">---</div>
            <button class="cal-nav" onclick="changeMonth(1)">[ ÎNAINTE ]</button>
        </div>
        <div class="calendar-grid" id="calendar-container"></div>
    </div>
</div>

<div id="view-tasks" class="view">
    <div class="box">
        <span class="box-title">REGISTRU_ACTIVITĂȚI_COMPLET</span>
        <div id="task-list" style="min-height: 300px;"></div>
        <button class="btn-action" onclick="addTask()">[ + CREARE_TASK_NOU ]</button>
    </div>
</div>

<script>
    // --- DATE CONECTARE SUPABASE ---
    const SUPABASE_URL = 'https://leazrnipgytsvnhwcelc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_viCJdI5RRPbXU6HPxdciXg_6ou-oYoY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const team = ["PREȘEDINTE", "VICEPREȘEDINTE", "SECRETAR"];
    let tasks = [];
    let events = {};
    let currentUser = localStorage.getItem('smh_user') || "PREȘEDINTE";
    let navDate = new Date();

    async function init() {
        document.getElementById('user-btn').innerText = currentUser;
        updateClock(); setInterval(updateClock, 1000);
        await syncData(); setInterval(syncData, 5000);
    }

    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleString('ro-RO'); }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
        window.scrollTo(0, 0); // Scroll sus la schimbarea paginii pe mobil
    }

    function changeUser() {
        const id = prompt("INTRODU ID FUNCȚIE:\n1. PREȘEDINTE\n2. VICEPREȘEDINTE\n3. SECRETAR");
        if(id && team[id-1]) {
            currentUser = team[id-1];
            localStorage.setItem('smh_user', currentUser);
            location.reload();
        }
    }

    async function changeObiectiv() {
        const current = document.getElementById('stat-obiectiv').innerText;
        const n = prompt("SETEAZĂ OBIECTIV (ex: 12/30):", current);
        if(n !== null) {
            await _supabase.from('events').upsert({ date_key: 'META_OBIECTIV', note: n.toUpperCase() });
            syncData();
        }
    }

    function changeMonth(direction) {
        navDate.setMonth(navDate.getMonth() + direction);
        renderCalendar();
    }

    async function syncData() {
        try {
            const { data: tData } = await _supabase.from('tasks').select('*').order('id', { ascending: false });
            const { data: eData } = await _supabase.from('events').select('*');
            if(tData) tasks = tData;
            if(eData) { events = {}; eData.forEach(e => events[e.date_key] = e.note); }
            
            document.getElementById('db-status').innerText = "ONLINE";
            document.getElementById('db-status').style.color = "var(--accent)";
            
            if(events['META_OBIECTIV']) document.getElementById('stat-obiectiv').innerText = events['META_OBIECTIV'];
            
            renderTasks(); renderCalendar(); renderTeam(); renderDashboardPreviews();
        } catch (e) { document.getElementById('db-status').innerText = "OFFLINE"; }
    }

    function renderTeam() {
        const list = document.getElementById('team-list');
        list.innerHTML = team.map(m => `
            <div style="border: 1px solid var(--border); padding: 10px; text-align: center;">
                <div style="font-weight: bold; margin-bottom: 5px; font-size: 10px;">${m} ${m === currentUser ? '(TU)' : ''}</div>
                <div style="color:${m === currentUser ? 'var(--accent)' : '#444'}; font-size: 9px;">${m === currentUser ? '● ONLINE' : '○ OFFLINE'}</div>
            </div>
        `).join('');
    }

    function renderCalendar() {
        const container = document.getElementById('calendar-container');
        const year = navDate.getFullYear(), month = navDate.getMonth();
        const monthName = navDate.toLocaleString('ro-RO', { month: 'long' }).toUpperCase();
        document.getElementById('calendar-month-name').innerText = `${monthName} ${year}`;
        
        // Nume scurte pe mobil ca sa incapa perfect
        container.innerHTML = '<div class="cal-day-label">LU</div><div class="cal-day-label">MA</div><div class="cal-day-label">MI</div><div class="cal-day-label">JO</div><div class="cal-day-label">VI</div><div class="cal-day-label">SÂ</div><div class="cal-day-label">DU</div>';
        
        let firstDay = new Date(year, month, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1;
        for(let i=0; i<firstDay; i++) container.innerHTML += '<div></div>';
        
        const today = new Date();
        for(let d=1; d<=new Date(year, month+1, 0).getDate(); d++) {
            const dKey = `${year}-${month+1}-${d}`;
            const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
            const cell = document.createElement('div');
            cell.className = `cal-cell ${isToday ? 'today' : ''}`;
            const eventHtml = events[dKey] ? `<span class="cal-event-text">${events[dKey]}</span>` : '';
            cell.innerHTML = `<div>${d}</div>${eventHtml}`;
            cell.onclick = async () => {
                const n = prompt(`EVENIMENT PENTRU ${d}/${month+1}/${year}:`, events[dKey] || "");
                if(n !== null) {
                    if(n) await _supabase.from('events').upsert({ date_key: dKey, note: n.toUpperCase() });
                    else await _supabase.from('events').delete().eq('date_key', dKey);
                    syncData();
                }
            };
            container.appendChild(cell);
        }
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = tasks.map((t) => `
            <div class="task-item ${t.completed ? 'completed' : ''}">
                <div style="width: 100%;">
                    <div style="font-weight:bold; font-size: 13px;">> ${t.text}</div>
                    <div class="tag-owner">${t.who} | DL: ${t.deadline}</div>
                </div>
                <div class="task-actions">
                    <button onclick="toggleTask(${t.id}, ${t.completed})" style="background:none; border:1px solid #444; color:white; cursor:pointer;">DONE</button>
                    <button onclick="deleteTask(${t.id})" style="background:none; border:1px solid var(--warning); color:var(--warning); cursor:pointer;">STERGE</button>
                </div>
            </div>
        `).join('');
        document.getElementById('count-active').innerText = tasks.filter(t => !t.completed).length;
        document.getElementById('count-done').innerText = tasks.filter(t => t.completed).length;
    }

    function renderDashboardPreviews() {
        const dashTasks = document.getElementById('dash-tasks-preview');
        const activeTasks = tasks.filter(t => !t.completed).slice(0, 3);
        dashTasks.innerHTML = activeTasks.length === 0 ? "NICIUN TASK ACTIV." : activeTasks.map(t => `<div style="padding: 8px 0; border-bottom: 1px solid #111;">> ${t.text}</div>`).join('');

        const dashEvents = document.getElementById('dash-events-preview');
        const upcoming = Object.keys(events).filter(k => k !== 'META_OBIECTIV').slice(-3);
        dashEvents.innerHTML = upcoming.length === 0 ? "NICIUN EVENIMENT." : upcoming.map(date => `<div style="padding: 8px 0; border-bottom: 1px solid #111;">[${date}] : ${events[date]}</div>`).join('');
    }

    async function addTask() {
        const txt = prompt("DESCRIERE TASK:"); if(!txt) return;
        const whoIdx = prompt("ASIGNEAZĂ:\n1. PREȘEDINTE\n2. VICEPREȘEDINTE\n3. SECRETAR\nSAU 'ALL'", "1");
        const who = whoIdx.toUpperCase() === "ALL" ? "TOATĂ ECHIPA" : team[whoIdx-1] || "PREȘEDINTE";
        const dl = prompt("DEADLINE (ex: 30 APR):", "ASAP");
        await _supabase.from('tasks').insert([{ text: txt.toUpperCase(), who, deadline: dl.toUpperCase(), completed: false }]);
        syncData();
    }

    async function toggleTask(id, stat) { await _supabase.from('tasks').update({ completed: !stat }).eq('id', id); syncData(); }
    async function deleteTask(id) { if(confirm("ȘTERGI ACEST TASK?")) { await _supabase.from('tasks').delete().eq('id', id); syncData(); } }

    init();
</script>
</body>
</html>
